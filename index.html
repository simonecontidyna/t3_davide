<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Simple Tic Tac Toe game" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Tic Tac Toe</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
        Ubuntu, Cantarell, 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .game-board {
      background: white;
      padding: 2rem;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .game-board h1 {
      color: #333;
      margin-bottom: 1.5rem;
      font-size: 2.5rem;
    }

    .status {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: #555;
      font-weight: bold;
      min-height: 2rem;
    }

    .board {
      display: inline-grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 0;
    }

    .square {
      background: #f0f0f0;
      border: 2px solid #ddd;
      font-size: 3rem;
      font-weight: bold;
      line-height: 100px;
      height: 100px;
      width: 100px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s ease;
      color: #333;
    }

    .square:hover {
      background: #e0e0e0;
    }

    .square:focus {
      outline: 3px solid #667eea;
      outline-offset: -3px;
      background: #d0d0d0;
    }

    .square:nth-child(1) { border-top-left-radius: 8px; }
    .square:nth-child(3) { border-top-right-radius: 8px; }
    .square:nth-child(7) { border-bottom-left-radius: 8px; }
    .square:nth-child(9) { border-bottom-right-radius: 8px; }

    .reset-button {
      margin-top: 2rem;
      padding: 12px 24px;
      font-size: 1.1rem;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
      font-weight: bold;
    }

    .reset-button:hover {
      background: #5568d3;
    }

    .reset-button:focus {
      outline: 3px solid #333;
      outline-offset: 2px;
      background: #5568d3;
    }
  </style>
</head>
<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <div class="game-board" role="main">
    <h1>Tic Tac Toe</h1>
    <div class="status" id="status" aria-live="polite" role="status">Next player: X</div>
    <div class="board" id="board" role="grid" aria-label="Tic Tac Toe board"></div>
    <button class="reset-button" id="reset-btn">Reset Game</button>
  </div>

  <script>
    (function () {
      'use strict';

      const POSITION_LABELS = [
        'top-left', 'top-center', 'top-right',
        'middle-left', 'center', 'middle-right',
        'bottom-left', 'bottom-center', 'bottom-right',
      ];

      const WINNING_LINES = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8],
        [0, 3, 6], [1, 4, 7], [2, 5, 8],
        [0, 4, 8], [2, 4, 6],
      ];

      let squares = Array(9).fill(null);
      let xIsNext = true;

      const boardEl = document.getElementById('board');
      const statusEl = document.getElementById('status');
      const resetBtn = document.getElementById('reset-btn');

      function calculateWinner() {
        for (const [a, b, c] of WINNING_LINES) {
          if (squares[a] && squares[a] === squares[b] && squares[a] === squares[c]) {
            return squares[a];
          }
        }
        return null;
      }

      function updateStatus() {
        const winner = calculateWinner();
        const isDraw = !winner && squares.every(Boolean);
        if (winner) {
          statusEl.textContent = 'Winner: ' + winner;
        } else if (isDraw) {
          statusEl.textContent = 'Draw! No winner.';
        } else {
          statusEl.textContent = 'Next player: ' + (xIsNext ? 'X' : 'O');
        }
      }

      function updateAriaLabel(btn, index) {
        const pos = POSITION_LABELS[index];
        btn.setAttribute('aria-label',
          squares[index]
            ? 'Square ' + pos + ', marked ' + squares[index]
            : 'Square ' + pos + ', empty'
        );
      }

      function handleClick(index) {
        if (calculateWinner() || squares[index]) return;
        squares[index] = xIsNext ? 'X' : 'O';
        xIsNext = !xIsNext;

        const btn = boardEl.children[index];
        btn.textContent = squares[index];
        updateAriaLabel(btn, index);
        updateStatus();
      }

      function resetGame() {
        squares = Array(9).fill(null);
        xIsNext = true;
        for (let i = 0; i < 9; i++) {
          const btn = boardEl.children[i];
          btn.textContent = '';
          updateAriaLabel(btn, i);
        }
        updateStatus();
      }

      function init() {
        boardEl.innerHTML = '';
        for (let i = 0; i < 9; i++) {
          const btn = document.createElement('button');
          btn.className = 'square';
          btn.textContent = '';
          updateAriaLabel(btn, i);
          btn.addEventListener('click', function () { handleClick(i); });
          boardEl.appendChild(btn);
        }
        resetBtn.addEventListener('click', resetGame);
        updateStatus();
      }

      init();
    })();
  </script>
</body>
</html>
